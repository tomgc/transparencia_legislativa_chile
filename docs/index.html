<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portal de Transparencia Legislativa — Cámara de Diputadas y Diputados</title>
<style>
/* =========================================================================
   FUENTES AUTOHOSPEDADAS
   Declaradas aquí, archivos .woff2 en assets/fonts/ (ver Fase 3 del log).
   Sin CDN: si los .woff2 no están presentes, el navegador cae a los
   fallbacks del stack (serif/sans-serif/monospace del sistema).
   ========================================================================= */
@font-face{font-family:'Spectral';font-style:normal;font-weight:400;font-display:swap;src:url('assets/fonts/spectral-400.woff2') format('woff2')}
@font-face{font-family:'Spectral';font-style:normal;font-weight:500;font-display:swap;src:url('assets/fonts/spectral-500.woff2') format('woff2')}
@font-face{font-family:'Spectral';font-style:normal;font-weight:600;font-display:swap;src:url('assets/fonts/spectral-600.woff2') format('woff2')}
@font-face{font-family:'Spectral';font-style:normal;font-weight:700;font-display:swap;src:url('assets/fonts/spectral-700.woff2') format('woff2')}
@font-face{font-family:'Public Sans';font-style:normal;font-weight:400;font-display:swap;src:url('assets/fonts/public-sans-400.woff2') format('woff2')}
@font-face{font-family:'Public Sans';font-style:normal;font-weight:500;font-display:swap;src:url('assets/fonts/public-sans-500.woff2') format('woff2')}
@font-face{font-family:'Public Sans';font-style:normal;font-weight:600;font-display:swap;src:url('assets/fonts/public-sans-600.woff2') format('woff2')}
@font-face{font-family:'Public Sans';font-style:normal;font-weight:700;font-display:swap;src:url('assets/fonts/public-sans-700.woff2') format('woff2')}
@font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:400;font-display:swap;src:url('assets/fonts/ibm-plex-mono-400.woff2') format('woff2')}
@font-face{font-family:'IBM Plex Mono';font-style:normal;font-weight:500;font-display:swap;src:url('assets/fonts/ibm-plex-mono-500.woff2') format('woff2')}

:root{
  --bg-page:#EFEBE0;
  --surface-card:#FBFAF5;
  --surface-hover:#F4EFE2;
  --surface-tertiary:#F0EBDE;
  --surface-asistencia:#F3EEE1;
  --chip-fill:#EAE4D4;
  --topbar-bg:#241F18;
  --topbar-text:#F1ECDF;
  --topbar-muted:#B4AC9C;
  --badge-bg:#C9B896;
  --border-main:#DED6C2;
  --border-card:#E4DDCB;
  --border-row:#ECE6D8;
  --border-row-alt:#EDE7D9;
  --border-hover:#C4B492;
  --text-primary:#2A2622;
  --text-primary-2:#241F18;
  --text-secondary:#3A342A;
  --text-secondary-2:#524B3C;
  --text-muted:#6B634F;
  --text-muted-2:#8A8266;
  --text-muted-3:#96907C;
  --text-muted-4:#A59C82;
  --accent-blue:#2F5578;
  --accent-blue-hover:#21384f;
  --accent-green:#4B7A52;
  --accent-red:#A6483F;
  --accent-amber:#B0873C;
  --accent-gray:#8C8578;
  --font-serif:'Spectral',Georgia,'Times New Roman',serif;
  --font-sans:'Public Sans',system-ui,-apple-system,'Segoe UI',sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
  --shadow-card:0 1px 2px rgba(60,50,30,.05);
  --shadow-dropdown:0 14px 32px rgba(50,40,20,.17);
  --focus-ring:0 0 0 3px rgba(47,85,120,.12);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg-page);font-family:var(--font-sans);color:var(--text-primary);min-height:100vh}
input,button,select{font-family:inherit;color:inherit}
button{cursor:pointer}
a{color:var(--accent-blue);text-decoration:none}
a:hover{color:var(--accent-blue-hover)}
::selection{background:#E1D7C0}
.tabnum{font-variant-numeric:tabular-nums}

@keyframes shimmer{0%{background-position:-360px 0}100%{background-position:360px 0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.skeleton{animation:shimmer 1.4s infinite linear;background:linear-gradient(90deg,#E7E1D2 25%,#F1ECDF 37%,#E7E1D2 63%);background-size:720px 100%;border-radius:5px}
.fade-up{animation:fadeUp .3s ease}

/* ---- Topbar ---- */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;padding:14px 24px;background:var(--topbar-bg);color:var(--topbar-text)}
.topbar-left{display:flex;align-items:center;gap:13px}
.topbar-logo{width:36px;height:36px;flex:0 0 auto;border:1.5px solid #6A6250;border-radius:7px;display:flex;align-items:center;justify-content:center}
.topbar-logo-diamond{width:13px;height:13px;background:var(--topbar-muted);transform:rotate(45deg)}
.topbar-eyebrow{font-size:11px;letter-spacing:.06em;color:var(--topbar-muted)}
.topbar-title{font-family:var(--font-serif);font-size:17px;font-weight:600;letter-spacing:-.01em}
.topbar-badge{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.08em;color:var(--topbar-bg);background:var(--badge-bg);padding:5px 10px;border-radius:5px}

/* ---- Filtros (sticky) ---- */
.filters-zone{position:sticky;top:0;z-index:40;background:var(--bg-page);border-bottom:1px solid var(--border-main);padding:16px 24px 14px}
.filters-zone.narrow{position:static;padding:14px 16px}
.filters-inner{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:15px}
.filters-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px}
.search-wrap{flex:1 1 220px;min-width:170px;position:relative}
.search-input{width:100%;padding:10px 14px;border:1px solid var(--border-main);border-radius:9px;background:var(--surface-card);font-size:14px;color:var(--text-primary);outline:none}
.search-input:focus{border-color:var(--accent-blue);box-shadow:var(--focus-ring)}
.btn-filter{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1px solid var(--border-main);border-radius:9px;background:var(--surface-card);font-size:14px;font-weight:500;color:var(--text-secondary);border-width:1px}
.btn-filter:hover{border-color:var(--border-hover)}
.btn-filter .chev{color:var(--text-muted-4)}
.dropdown-wrap{position:relative;flex:0 0 auto}
.dropdown-panel{position:absolute;top:calc(100% + 6px);left:0;z-index:30;overflow:auto;background:var(--surface-card);border:1px solid var(--border-main);border-radius:12px;box-shadow:var(--shadow-dropdown);padding:8px}
.panel-party{width:308px;max-height:344px}
.panel-region{width:250px;max-height:320px}
.panel-settings{width:270px;max-height:400px}
.opt-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer}
.opt-row:hover{background:var(--surface-tertiary)}
.opt-checkbox{width:16px;height:16px;border-radius:4px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--surface-card)}
.opt-checkbox.checked{background:var(--accent-blue);border:1px solid var(--accent-blue)}
.opt-checkbox.unchecked{border:1.5px solid #CBC2AC}
.opt-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.opt-sigla{font-family:var(--font-mono);font-size:12px;font-weight:600;color:#4A4436;width:44px;flex:0 0 44px}
.opt-nombre{font-size:12.5px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.region-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-secondary)}
.region-row:hover{background:var(--surface-tertiary)}
.region-check{width:14px;flex:0 0 14px;color:var(--accent-blue);font-weight:700}
.settings-group{padding:6px 8px 10px}
.settings-label{font-size:10.5px;font-weight:700;letter-spacing:.04em;color:var(--text-muted-2);text-transform:uppercase;margin:6px 0 6px}
.settings-option{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--text-secondary)}
.settings-option:hover{background:var(--surface-tertiary)}
.settings-radio{width:13px;height:13px;border-radius:50%;border:1.5px solid #CBC2AC;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
.settings-radio.checked{border-color:var(--accent-blue)}
.settings-radio.checked::after{content:'';width:7px;height:7px;border-radius:50%;background:var(--accent-blue)}
.settings-toggle{width:30px;height:17px;border-radius:20px;background:#CBC2AC;position:relative;flex:0 0 auto}
.settings-toggle.on{background:var(--accent-blue)}
.settings-toggle::after{content:'';position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:var(--surface-card);transition:left .15s}
.settings-toggle.on::after{left:15px}
.btn-clear{background:none;border:none;font-size:13px;font-weight:600;color:var(--accent-red);padding:8px 4px}
.btn-clear:hover{text-decoration:underline}
.result-count{margin-left:auto;font-size:13px;color:var(--text-muted)}
.result-count strong{color:var(--text-primary)}
.overlay{position:fixed;inset:0;z-index:20;background:transparent}

/* ---- Tarjeta hemiciclo ---- */
.hemi-outer{max-width:1200px;margin:0 auto;padding:18px 24px 0}
.hemi-card{background:var(--surface-card);border:1px solid var(--border-card);border-radius:12px;padding:16px 20px 14px}
.hemi-title{font-size:14px;color:var(--text-secondary);font-weight:600;margin-bottom:9px}
.hemi-legend{display:flex;flex-wrap:wrap;justify-content:center;gap:6px 12px;margin-bottom:4px}
.legend-item{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-secondary-2);cursor:pointer;white-space:nowrap;background:none;border:none;padding:2px 3px}
.legend-item strong{color:var(--text-primary-2)}
.legend-pct{color:var(--text-muted-2);font-size:11.5px}
.legend-swatch{display:inline-block;width:10px;height:10px;flex:0 0 auto;border-radius:50%}
.hemi-svg-wrap{max-width:500px;margin:0 auto}
.hemi-svg-wrap svg{width:100%;height:auto;display:block}
.hemi-seat{cursor:pointer;transition:opacity .2s}

/* ---- Tarjeta tabla ---- */
.table-outer{max-width:1200px;margin:0 auto;padding:20px 24px 64px}
.table-card{border:1px solid var(--border-card);border-radius:12px;overflow:hidden;background:var(--surface-card);box-shadow:var(--shadow-card)}
.thead-row{display:flex;align-items:center;padding:0 22px;height:46px;background:var(--surface-tertiary);border-bottom:1px solid var(--border-main)}
.th{font-size:11.5px;font-weight:700;letter-spacing:.01em;color:var(--text-muted);line-height:1.15}
.th-btn{background:none;border:none;padding:0;text-align:left;font:inherit;color:inherit;cursor:pointer}
.th-btn:hover{color:var(--text-secondary-2)}
.col-nombre{flex:1 1 auto;min-width:160px;padding-right:12px}
.col-partido{width:70px;flex:0 0 70px}
.col-tend{width:156px;flex:0 0 156px;display:flex;align-items:center;gap:8px}
.col-region{width:118px;flex:0 0 118px}
.col-asist{width:96px;flex:0 0 96px;text-align:right}
.col-proy{width:104px;flex:0 0 104px;text-align:right}
.col-vot{width:104px;flex:0 0 104px;text-align:right}
.th-asist,.th-proy,.th-vot{display:flex;flex-direction:column;align-items:flex-end;gap:0}

.data-row{display:flex;align-items:center;padding:0 22px;border-bottom:1px solid var(--border-row);background:var(--surface-card);cursor:pointer}
.data-row.comoda{height:62px}
.data-row.compacta{height:46px}
.data-row:hover{background:var(--surface-hover)}
.cell-nombre{flex:1 1 auto;min-width:160px;display:flex;flex-direction:column;gap:1px;padding-right:12px}
.cell-nombre-name{font-weight:600;font-size:15px;color:var(--text-primary);letter-spacing:-.01em}
.cell-nombre-sub{font-size:11.5px;color:var(--text-muted-3)}
.cell-partido{width:70px;flex:0 0 70px}
.chip-sigla{font-family:var(--font-mono);font-size:12px;font-weight:600;color:#4A4436;background:var(--chip-fill);border:1px solid var(--border-main);padding:2px 7px;border-radius:5px;cursor:help}
.cell-tend{width:156px;flex:0 0 156px;display:flex;align-items:center;gap:8px}
.tend-dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
.tend-label{font-size:13px;color:var(--text-secondary-2)}
.cell-region{width:118px;flex:0 0 118px}
.sin-dato{font-size:12px;font-style:italic;color:var(--text-muted-4)}
.cell-asist{width:96px;flex:0 0 96px;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.cell-proy{width:104px;flex:0 0 104px;text-align:right}
.cell-vot{width:104px;flex:0 0 104px;text-align:right}
.num-val{font-size:14.5px;font-weight:600;color:var(--text-primary);}
.mobile-lbl{display:none;font-size:10.5px;font-weight:600;letter-spacing:.01em;color:var(--text-muted-2)}
.asist-bar-track{width:54px;height:5px;background:var(--chip-fill);border-radius:3px;overflow:hidden}
.asist-bar-fill{height:100%;border-radius:3px}

.skeleton-row{display:flex;align-items:center;gap:18px;padding:0 22px;height:62px;border-bottom:1px solid var(--border-row)}
.skel-empty{padding:56px 24px;text-align:center}
.skel-empty-title{font-family:var(--font-serif);font-size:20px;color:var(--text-secondary-2);margin-bottom:8px}
.skel-empty-msg{font-size:13.5px;color:var(--text-muted-2);max-width:460px;margin:0 auto;line-height:1.55}

/* ---- Responsive ---- */
.narrow .thead-row{display:none}
.narrow .data-row{flex-wrap:wrap;align-items:baseline;column-gap:14px;row-gap:8px;padding:15px 16px;height:auto}
.narrow .cell-nombre{flex-basis:100%}
.narrow .cell-tend{flex:1 1 auto;min-width:150px}
.narrow .cell-region{flex-basis:100%;margin-top:1px}
.narrow .cell-asist,.narrow .cell-proy,.narrow .cell-vot{flex:1 1 28%;min-width:80px;align-items:flex-start;text-align:left}
.narrow .mobile-lbl{display:block}

/* ---- Ficha (perfil) ---- */
.profile-view{max-width:1080px;margin:0 auto;padding:22px 20px 64px}
.btn-back{display:inline-flex;align-items:center;gap:7px;background:none;border:1px solid var(--border-main);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;color:var(--text-secondary-2);margin-bottom:18px}
.btn-back:hover{border-color:var(--border-hover);background:var(--surface-card)}
.btn-back .chevron{font-size:15px}
.profile-header{display:flex;flex-wrap:wrap;gap:22px;align-items:stretch;justify-content:space-between;background:var(--surface-card);border:1px solid var(--border-card);border-radius:14px;padding:24px 26px;box-shadow:var(--shadow-card)}
.profile-left{flex:1 1 340px;min-width:260px;display:flex;flex-direction:column;gap:14px;justify-content:center}
.profile-eyebrow{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;color:var(--text-muted-4);margin-bottom:5px}
.profile-h1{margin:0;font-family:var(--font-serif);font-size:30px;font-weight:600;letter-spacing:-.01em;color:var(--text-primary-2);line-height:1.12}
.profile-chips{display:flex;flex-wrap:wrap;gap:9px;align-items:center}
.chip-tend{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:20px;font-size:13px;font-weight:600}
.chip-tend-dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
.chip-party{display:inline-flex;align-items:center;gap:8px;padding:5px 11px;border-radius:8px;background:var(--chip-fill);border:1px solid var(--border-main)}
.chip-party .sigla{font-family:var(--font-mono);font-size:12px;font-weight:600;color:#4A4436}
.chip-party .nombre{font-size:12.5px;color:var(--text-muted)}
.chip-region{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:8px;border:1px solid var(--border-card);color:var(--text-muted-3);font-size:12.5px}
.chip-region span{font-style:italic}
.profile-right{flex:0 0 300px;max-width:100%;background:var(--surface-asistencia);border:1px solid var(--border-card);border-radius:12px;padding:16px 18px;display:flex;flex-direction:column;justify-content:center}
.asist-head{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:10px}
.asist-label{font-family:var(--font-mono);font-size:11px;letter-spacing:.05em;color:var(--text-muted-2)}
.asist-pct-wrap{display:inline-flex;align-items:baseline;gap:3px}
.asist-pct{font-family:var(--font-serif);font-size:40px;font-weight:600;color:var(--text-primary-2);line-height:1}
.asist-pct-sign{font-family:var(--font-serif);font-size:22px;color:var(--accent-green);font-weight:600}
.asist-track{height:7px;border-radius:5px;background:var(--chip-fill);overflow:hidden;margin-bottom:12px}
.asist-fill{height:100%;background:var(--accent-green)}
.mini-cards{display:flex;gap:8px}
.mini-card{flex:1 1 0;background:var(--surface-card);border:1px solid var(--border-card);border-radius:8px;padding:9px 4px;text-align:center}
.mini-card .val{font-size:18px;font-weight:600}
.mini-card .lbl{font-size:10px;color:var(--text-muted-2);margin-top:2px}
.mini-card.skel{height:46px;padding:0}

.section-card{width:100%;background:var(--surface-card);border:1px solid var(--border-card);border-radius:14px;padding:22px 24px}
.section-card + .section-card{margin-top:18px}
.section-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.section-label{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;color:var(--text-muted-2)}
.section-total{font-size:12.5px;color:var(--text-muted-2)}
.section-total strong{font-size:20px;color:var(--text-primary-2);font-family:var(--font-serif)}
.badge-nodisp{font-size:11.5px;color:var(--text-muted-3);background:var(--surface-asistencia);border:1px solid var(--border-card);border-radius:6px;padding:4px 9px}

.stack-bar{display:flex;height:14px;border-radius:7px;overflow:hidden;background:var(--chip-fill);margin-bottom:12px}
.vot-legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-bottom:18px}
.vot-legend-item{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text-secondary-2)}
.vot-legend-dot{width:9px;height:9px;border-radius:2px;flex:0 0 auto}

.mini-thead{display:flex;align-items:center;gap:12px;padding:0 0 7px;border-bottom:1px solid var(--border-main);font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;color:var(--text-muted-4)}
.mini-tbody{max-height:280px;overflow:auto}
.mini-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px 12px;padding:9px 0;border-top:1px solid var(--border-row-alt)}
.mini-cell-boletin{font-family:var(--font-mono);font-size:12px;color:var(--text-muted-2);width:82px;flex:0 0 82px}
.mini-cell-fecha{font-size:12px;color:var(--text-muted-2);width:88px;flex:0 0 88px}
.mini-cell-desc{flex:1 1 auto;font-size:13px;color:var(--text-secondary);min-width:160px}
.mini-cell-res{width:92px;flex:0 0 92px;white-space:nowrap;font-size:12px;font-weight:600}
.mini-cell-sent{width:88px;flex:0 0 88px;white-space:nowrap;font-size:12px;font-weight:600}
.note-italic{font-size:11.5px;color:var(--text-muted-4);margin-top:10px;font-style:italic}

.proy-thead .b{width:88px;flex:0 0 88px}
.proy-thead .n{flex:1 1 auto;min-width:180px}
.proy-thead .f{width:96px;flex:0 0 96px}
.proy-thead .r{width:90px;flex:0 0 90px}
.proy-thead .a{width:96px;flex:0 0 96px}
.proy-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px 12px;padding:11px 0;border-top:1px solid var(--border-row-alt)}
.proy-cell-boletin{font-family:var(--font-mono);font-size:12px;color:var(--text-muted-2);width:88px;flex:0 0 88px}
.proy-cell-nombre{flex:1 1 auto;font-size:13px;color:var(--text-secondary);min-width:200px}
.proy-cell-fecha{font-size:12px;color:var(--text-muted-2);width:96px;flex:0 0 96px}
.proy-cell-rol{font-size:12px;color:var(--text-muted);width:90px;flex:0 0 90px}
.proy-cell-adm{width:96px;flex:0 0 96px}
.pill-adm{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px}
.pill-adm.si{color:var(--accent-green);background:rgba(75,122,82,.1);border:1px solid rgba(75,122,82,.3)}
.pill-adm.no{color:var(--accent-red);background:rgba(166,72,63,.1);border:1px solid rgba(166,72,63,.3)}
.empty-italic{padding:22px 0 6px;font-size:13.5px;color:var(--text-muted-2);font-style:italic}

/* ---- Contenido legible: tipo de iniciativa y materias (chips) ---- */
.materias-line{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.materia-chip{font-size:10px;color:var(--text-secondary-2);background:var(--surface-tertiary);border:1px solid var(--border-card);border-radius:10px;padding:1px 8px;letter-spacing:.02em;white-space:nowrap}

<body>
<div id="app"></div>
<script>
'use strict';

/* =========================================================================
   CONSTANTES (datos reales embebidos: 18 partidos y 16 regiones de Chile;
   los nombres de partido se extrajeron de los perfiles JSON reales, no se
   inventaron — ver 50_documentacion/andamios/logs/ de esta sesion).
   ========================================================================= */
var TEND_ORDER = ['izquierda','centroizquierda','centro','centroderecha','derecha'];
var TEND_LABELS = {izquierda:'Izquierda',centroizquierda:'Centroizquierda',centro:'Centro',centroderecha:'Centroderecha',derecha:'Derecha',sinclasificar:'Independiente'};
var SEAT_GROUP_ORDER = ['derecha','centroderecha','centro','sinclasificar','centroizquierda','izquierda'];
var LEGEND_GROUP_ORDER = ['izquierda','centroizquierda','centro','centroderecha','derecha','sinclasificar'];

var PALETTES = {
  rojoAzul: {izquierda:'#AE3B34',centroizquierda:'#CB7B62',centro:'#9A917F',centroderecha:'#5E86AC',derecha:'#2F5578',sinclasificar:'#B4AC9C'},
  teal:     {izquierda:'#A9CFC9',centroizquierda:'#79B2A9',centro:'#4E9086',centroderecha:'#2F7268',derecha:'#17534A',sinclasificar:'#B4AC9C'},
  sobria:   {izquierda:'#A6564E',centroizquierda:'#B0863F',centro:'#6E8E68',centroderecha:'#4E7C93',derecha:'#6A5B8A',sinclasificar:'#B4AC9C'}
};
var SCHEME_LABELS = {rojoAzul:'Divergente rojo-azul', teal:'Secuencial teal', sobria:'Categórica sobria'};

/* El nombre completo del partido viene en cada fila del indice
   (r.partido_nombre, dato real de la fuente) — no se embebe a mano aqui. */

/* Etiqueta de genero por fila: dominio real de "sexo" en la fuente
   (inspeccionado en R sobre la tabla diputados: {"Femenino","Masculino"},
   sin NA). Si un valor no esta en este mapeo (o es null), el llamador cae al
   neutro "Diputada/Diputado" — nunca se adivina el genero. */
var SEXO_LABEL = {Femenino:'Diputada', Masculino:'Diputado'};
var SEXO_LABEL_NEUTRO = 'Diputada/Diputado';

/* Las 16 regiones de Chile (geografía real, no dato ficticio). El filtro
   Región queda preparado: la fuente actual no expone region/distrito (ver
   CLAUDE.md, huecos conocidos), así que elegir una region concreta siempre
   da 0 resultados con estado vacio explicativo; "Sin dato" muestra todo. */
var REGIONES = ['Arica y Parinacota','Tarapacá','Antofagasta','Atacama','Coquimbo','Valparaíso','Metropolitana','O’Higgins','Maule','Ñuble','Biobío','La Araucanía','Los Ríos','Los Lagos','Aysén','Magallanes'];

var MESES = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

function fmtFecha(iso){
  if(!iso) return '—';
  var p = iso.split('-');
  if(p.length!==3) return iso;
  var y=p[0], m=parseInt(p[1],10)-1, d=parseInt(p[2],10);
  return d+' '+(MESES[m]||'')+' '+y;
}

/* =========================================================================
   ESTADO
   ========================================================================= */
var state = {
  view:'index', selectedId:null,
  index:[], indexReady:false, indexError:false,
  profileCache:{}, profileLoading:false, profileError:false,
  search:'', selectedParties:{}, selectedTend:{}, region:'',
  sort:{field:'nombre', dir:'asc'},
  partyPanelOpen:false, regionPanelOpen:false, settingsPanelOpen:false,
  vw: window.innerWidth,
  scheme:'rojoAzul', density:'comoda', showBar:false
};

var STATIC = null; /* geometria del hemiciclo + conteos totales, calculado una vez al cargar el indice */

/* =========================================================================
   GEOMETRIA DEL HEMICICLO (traducida 1:1 del prototipo de diseno)
   ========================================================================= */
function computeHemicycle(total, rows, ratio){
  var radii = [];
  for(var i=0;i<rows;i++){ radii.push(ratio+(1-ratio)*(i/(rows-1))); }
  var sum = radii.reduce(function(a,b){return a+b;},0);
  var raw = radii.map(function(r){return r/sum*total;});
  var counts = raw.map(function(x){return Math.floor(x);});
  var rem = total - counts.reduce(function(a,b){return a+b;},0);
  var fr = raw.map(function(x,i){return {i:i,f:x-Math.floor(x)};}).sort(function(a,b){return b.f-a.f;});
  for(var k=0;k<rem;k++){ counts[fr[k].i]++; }
  var seats = [];
  radii.forEach(function(r,ri){
    var c = counts[ri];
    for(var j=0;j<c;j++){
      var t = c===1 ? 0.5 : (j/(c-1));
      var ang = Math.PI*(1-t);
      seats.push({r:r, ang:ang});
    }
  });
  seats.sort(function(a,b){ return (b.ang-a.ang) || (a.r-b.r); });
  var R=95, cx=100, cy=100;
  return seats.map(function(s){ return {cx: cx+R*s.r*Math.cos(s.ang), cy: cy-R*s.r*Math.sin(s.ang)}; });
}

function computeStatic(idx){
  var fullCounts = {izquierda:0,centroizquierda:0,centro:0,centroderecha:0,derecha:0,sinclasificar:0};
  idx.forEach(function(r){ fullCounts[r.tendencia||'sinclasificar']++; });
  var total = idx.length;
  var hemi = computeHemicycle(total, 8, 0.42);
  var seatTend = [];
  SEAT_GROUP_ORDER.forEach(function(k){ for(var i=0;i<fullCounts[k];i++) seatTend.push(k); });
  var partidosBySigla = {};
  idx.forEach(function(r){
    if(!partidosBySigla[r.partido]) partidosBySigla[r.partido] = {sigla:r.partido, nombre:r.partido_nombre, tendencia:r.tendencia, count:0};
    partidosBySigla[r.partido].count++;
  });
  var partidos = Object.keys(partidosBySigla).map(function(k){ return partidosBySigla[k]; });
  partidos.sort(function(a,b){
    var order = TEND_ORDER;
    var ao = a.tendencia ? order.indexOf(a.tendencia) : order.length;
    var bo = b.tendencia ? order.indexOf(b.tendencia) : order.length;
    if(ao!==bo) return ao-bo;
    return b.count-a.count;
  });
  return {fullCounts:fullCounts, hemi:hemi, seatTend:seatTend, total:total, partidos:partidos};
}

/* =========================================================================
   FETCH + ROUTING (hash-based; deep link soportado)
   ========================================================================= */
function esc(s){
  if(s===null||s===undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function parseHash(){
  var h = location.hash || '#/';
  var m = h.match(/^#\/diputado\/([^\/]+)$/);
  if(m) return {view:'profile', id: decodeURIComponent(m[1])};
  return {view:'index', id:null};
}

function loadIndex(){
  fetch('data/indice_diputados.json').then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(data){
    state.index = data;
    STATIC = computeStatic(data);
    state.indexReady = true;
    render();
  }).catch(function(){
    state.indexError = true;
    state.indexReady = true;
    render();
  });
}

function loadProfile(id){
  state.profileLoading = true;
  state.profileError = false;
  fetch('data/perfiles/'+encodeURIComponent(id)+'.json').then(function(r){
    if(!r.ok) throw new Error('HTTP '+r.status);
    return r.json();
  }).then(function(p){
    state.profileCache[id] = p;
    if(state.selectedId===id){ state.profileLoading=false; render(); }
  }).catch(function(){
    if(state.selectedId===id){ state.profileLoading=false; state.profileError=true; render(); }
  });
}

function syncFromHash(){
  var parsed = parseHash();
  state.view = parsed.view;
  state.selectedId = parsed.id;
  state.partyPanelOpen = false; state.regionPanelOpen = false; state.settingsPanelOpen = false;
  if(parsed.view==='profile' && parsed.id){
    if(state.profileCache[parsed.id]){
      state.profileLoading = false; state.profileError = false;
    } else {
      loadProfile(parsed.id);
    }
    window.scrollTo(0,0);
  }
  render();
}

function openProfile(id){ location.hash = '#/diputado/'+encodeURIComponent(id); }
function goBack(){ location.hash = '#/'; }

window.addEventListener('hashchange', syncFromHash);
window.addEventListener('resize', function(){ state.vw = window.innerWidth; render(); });

/* =========================================================================
   DERIVACION (filtros, orden, hemiciclo) — traducida del prototipo,
   consumiendo el esquema real del JSON (id/partido = sigla, tendencia
   string|null, tasa_asistencia decimal 0..1, n_proyectos, n_votaciones).
   ========================================================================= */
function isNarrow(){ return state.vw < 820; }
function currentPalette(){ return PALETTES[state.scheme] || PALETTES.rojoAzul; }

function computeDerived(){
  var term = state.search.trim().toLowerCase();
  var selP = Object.keys(state.selectedParties).filter(function(k){ return state.selectedParties[k]; });
  var selT = Object.keys(state.selectedTend).filter(function(k){ return state.selectedTend[k]; });
  var anyT = selT.length>0;
  var idx = state.index || [];

  var base = idx.filter(function(r){
    if(term && r.nombre.toLowerCase().indexOf(term)<0) return false;
    if(selP.length && selP.indexOf(r.partido)<0) return false;
    if(state.region && state.region!=='__sindato__') return false;
    return true;
  });

  var rows = base.filter(function(r){
    if(!anyT) return true;
    return selT.indexOf(r.tendencia||'sinclasificar')>=0;
  });

  var f = state.sort.field, mul = state.sort.dir==='asc'?1:-1;
  rows = rows.slice().sort(function(a,b){
    if(f==='nombre') return a.nombre.localeCompare(b.nombre,'es')*mul;
    var av = f==='asistencia'?a.tasa_asistencia:(f==='proyectos'?a.n_proyectos:a.n_votaciones);
    var bv = f==='asistencia'?b.tasa_asistencia:(f==='proyectos'?b.n_proyectos:b.n_votaciones);
    if(av===bv) return a.nombre.localeCompare(b.nombre,'es');
    return (av-bv)*mul;
  });

  return {term:term, selP:selP, selT:selT, anyT:anyT, base:base, rows:rows};
}

function buildHemiLegend(base){
  var baseCounts = {}; LEGEND_GROUP_ORDER.forEach(function(k){ baseCounts[k]=0; });
  base.forEach(function(r){ baseCounts[r.tendencia||'sinclasificar']++; });
  var total = base.length || 1;
  var pal = currentPalette();
  var anyT = Object.keys(state.selectedTend).some(function(k){ return state.selectedTend[k]; });
  return LEGEND_GROUP_ORDER.map(function(k){
    var sel = !!state.selectedTend[k];
    var isSin = k==='sinclasificar';
    var color = pal[k];
    var count = baseCounts[k];
    var pct = Math.round(count/total*100);
    return {key:k,label:TEND_LABELS[k],count:count,pct:pct,sel:sel,isSin:isSin,color:color,dim:anyT&&!sel};
  });
}

function buildHemiSeats(base){
  var baseCounts = {}; SEAT_GROUP_ORDER.forEach(function(k){ baseCounts[k]=0; });
  base.forEach(function(r){ baseCounts[r.tendencia||'sinclasificar']++; });
  var seen = {}; SEAT_GROUP_ORDER.forEach(function(k){ seen[k]=0; });
  var pal = currentPalette();
  var selT = Object.keys(state.selectedTend).filter(function(k){ return state.selectedTend[k]; });
  var anyT = selT.length>0;
  return STATIC.hemi.map(function(pt,i){
    var tk = STATIC.seatTend[i];
    var seatIdx = seen[tk]++;
    var inBase = seatIdx < baseCounts[tk];
    var selDim = anyT && !state.selectedTend[tk];
    var op = 1;
    if(!inBase) op = 0.12; else if(selDim) op = 0.24;
    var isSin = tk==='sinclasificar';
    var color = pal[tk];
    return {cx:pt.cx.toFixed(2), cy:pt.cy.toFixed(2), tk:tk, isSin:isSin, color:color, op:op};
  });
}

/* =========================================================================
   BUILDERS DE HTML (strings) — sin JSX/build step
   ========================================================================= */
function buildTopbar(){
  return ''
  +'<div class="topbar">'
    +'<div class="topbar-left">'
      +'<div class="topbar-logo"><div class="topbar-logo-diamond"></div></div>'
      +'<div>'
        +'<div class="topbar-eyebrow">Cámara de Diputadas y Diputados · Chile</div>'
        +'<div class="topbar-title">Portal de Transparencia Legislativa</div>'
      +'</div>'
    +'</div>'
    +'<span class="topbar-badge">Datos reales · opendata.camara.cl</span>'
  +'</div>';
}

function buildPartyPanel(){
  if(!state.partyPanelOpen) return '';
  var opts = STATIC.partidos.map(function(p){
    var checked = !!state.selectedParties[p.sigla];
    var pal = currentPalette();
    var color = p.tendencia ? pal[p.tendencia] : pal.sinclasificar;
    var dotStyle = p.tendencia ? ('background:'+color) : ('background:transparent;border:1.5px dashed '+color);
    var nombre = p.nombre || p.sigla;
    return ''
    +'<div class="opt-row" data-action="toggle-party" data-sigla="'+esc(p.sigla)+'">'
      +'<span class="opt-checkbox '+(checked?'checked':'unchecked')+'">'+(checked?'✓':'')+'</span>'
      +'<span class="opt-dot" style="'+dotStyle+'"></span>'
      +'<span class="opt-sigla">'+esc(p.sigla)+'</span>'
      +'<span class="opt-nombre">'+esc(nombre)+'</span>'
    +'</div>';
  }).join('');
  return '<div class="dropdown-panel panel-party">'+opts+'</div>';
}

function buildRegionPanel(){
  if(!state.regionPanelOpen) return '';
  var opts = [{label:'Todas las regiones', value:''},{label:'Sin dato', value:'__sindato__'}]
    .concat(REGIONES.map(function(x){ return {label:x, value:x}; }));
  var rows = opts.map(function(o){
    var check = state.region===o.value ? '✓' : '';
    return '<div class="region-row" data-action="select-region" data-value="'+esc(o.value)+'">'
      +'<span class="region-check">'+check+'</span>'+esc(o.label)+'</div>';
  }).join('');
  return '<div class="dropdown-panel panel-region">'+rows+'</div>';
}

function buildSettingsPanel(){
  if(!state.settingsPanelOpen) return '';
  var schemeOpts = Object.keys(SCHEME_LABELS).map(function(k){
    var sel = state.scheme===k;
    return '<div class="settings-option" data-action="set-scheme" data-scheme="'+k+'">'
      +'<span class="settings-radio '+(sel?'checked':'')+'"></span>'+esc(SCHEME_LABELS[k])+'</div>';
  }).join('');
  var densOpts = ['comoda','compacta'].map(function(k){
    var sel = state.density===k;
    var lbl = k==='comoda' ? 'Cómoda' : 'Compacta';
    return '<div class="settings-option" data-action="set-density" data-density="'+k+'">'
      +'<span class="settings-radio '+(sel?'checked':'')+'"></span>'+lbl+'</div>';
  }).join('');
  return '<div class="dropdown-panel panel-settings">'
    +'<div class="settings-group"><div class="settings-label">Codificación de tendencia</div>'+schemeOpts+'</div>'
    +'<div class="settings-group"><div class="settings-label">Densidad de fila</div>'+densOpts+'</div>'
    +'<div class="settings-group"><div class="settings-label">Tabla</div>'
      +'<div class="settings-option" data-action="toggle-bar" style="justify-content:space-between">'
        +'<span>Barra de asistencia</span><span class="settings-toggle '+(state.showBar?'on':'')+'"></span>'
      +'</div>'
    +'</div>'
  +'</div>';
}

function buildFilters(base, hasFilters, resultCount){
  var nar = isNarrow();
  var selP = Object.keys(state.selectedParties).filter(function(k){return state.selectedParties[k];});
  var partyBtnSuffix = selP.length ? (' · '+selP.length) : '';
  var regionLabel = state.region===''?'Región':(state.region==='__sindato__'?'Región · Sin dato':'Región · '+state.region);

  return ''
  +'<div class="filters-zone'+(nar?' narrow':'')+'">'
    +'<div class="filters-inner">'
      +'<div class="filters-row">'
        +'<div class="search-wrap">'
          +'<input id="search-input" class="search-input" type="text" value="'+esc(state.search)+'" placeholder="Buscar por nombre…" autocomplete="off">'
        +'</div>'
        +'<div class="dropdown-wrap">'
          +'<button class="btn-filter" data-action="toggle-party-panel">Partido'+esc(partyBtnSuffix)+' <span class="chev">▾</span></button>'
          +buildPartyPanel()
        +'</div>'
        +'<div class="dropdown-wrap">'
          +'<button class="btn-filter" data-action="toggle-region-panel">'+esc(regionLabel)+' <span class="chev">▾</span></button>'
          +buildRegionPanel()
        +'</div>'
        +'<div class="dropdown-wrap">'
          +'<button class="btn-filter" data-action="toggle-settings-panel">Ajustes <span class="chev">▾</span></button>'
          +buildSettingsPanel()
        +'</div>'
        +(hasFilters ? '<button class="btn-clear" data-action="reset-filters">Limpiar</button>' : '')
        +'<span class="result-count">Mostrando <strong>'+resultCount+'</strong> de '+state.index.length+'</span>'
      +'</div>'
    +'</div>'
  +'</div>';
}

function buildHemiciclo(base){
  var legend = buildHemiLegend(base);
  var seats = buildHemiSeats(base);
  var legendHtml = legend.map(function(lg){
    return '<button class="legend-item" data-action="toggle-tend" data-tend="'+lg.key+'" '
      +'title="'+esc(TEND_LABELS[lg.key]+': '+lg.count+' ('+lg.pct+'%) — clic para filtrar')+'" '
      +'style="opacity:'+(lg.dim?0.5:1)+';font-weight:'+(lg.sel?600:400)+'">'
      +'<span class="legend-swatch" style="'+(lg.isSin?('background:#F4EFE2;border:1px solid '+lg.color):('background:'+lg.color))+'"></span>'
      +esc(lg.label)+' <strong>'+lg.count+'</strong> <span class="legend-pct">('+lg.pct+'%)</span>'
    +'</button>';
  }).join('');
  var seatsHtml = seats.map(function(s){
    var fill = s.isSin ? '#F4EFE2' : s.color;
    var stroke = s.isSin ? s.color : 'transparent';
    var sw = s.isSin ? '1.1px' : '0';
    return '<circle class="hemi-seat" cx="'+s.cx+'" cy="'+s.cy+'" r="2.7" data-action="toggle-tend" data-tend="'+s.tk+'" '
      +'style="fill:'+fill+';stroke:'+stroke+';stroke-width:'+sw+';opacity:'+s.op+'"></circle>';
  }).join('');
  return ''
  +'<div class="hemi-outer">'
    +'<div class="hemi-card">'
      +'<div class="hemi-title">Distribución de los <span class="tabnum">'+base.length+'</span> diputadas y diputados:</div>'
      +'<div class="hemi-legend">'+legendHtml+'</div>'
      +'<div class="hemi-svg-wrap"><svg viewBox="-6 -6 212 110">'+seatsHtml+'</svg></div>'
    +'</div>'
  +'</div>';
}

function sortArrow(field){
  if(state.sort.field!==field) return '';
  return state.sort.dir==='asc' ? ' ▲' : ' ▼';
}

function buildTableHeader(){
  if(isNarrow() || !state.indexReady) return '';
  return ''
  +'<div class="thead-row">'
    +'<button class="th th-btn col-nombre" data-action="sort" data-field="nombre">Nombre'+sortArrow('nombre')+'</button>'
    +'<span class="th col-partido" title="Sigla del partido — pasa el cursor sobre cada sigla en la tabla para ver el nombre completo" style="cursor:help">Partido</span>'
    +'<span class="th col-tend">Tendencia</span>'
    +'<span class="th col-region">Región / Distrito</span>'
    +'<button class="th th-btn col-asist" data-action="sort" data-field="asistencia">Asistencia'+sortArrow('asistencia')+'</button>'
    +'<button class="th th-btn col-proy" data-action="sort" data-field="proyectos">Proyectos presentados'+sortArrow('proyectos')+'</button>'
    +'<button class="th th-btn col-vot" data-action="sort" data-field="votaciones">Votaciones'+sortArrow('votaciones')+'</button>'
  +'</div>';
}

function buildSkeletonRows(){
  var widths = [190,160,210];
  return widths.map(function(w){
    return '<div class="skeleton-row">'
      +'<div class="skeleton" style="width:'+w+'px;height:14px"></div>'
      +'<div class="skeleton" style="width:46px;height:14px"></div>'
      +'<div class="skeleton" style="width:130px;height:14px"></div>'
      +'<div class="skeleton" style="flex:1;height:14px"></div>'
    +'</div>';
  }).join('');
}

function buildRows(rows){
  var nar = isNarrow();
  var pal = currentPalette();
  return rows.map(function(r){
    var tkey = r.tendencia || 'sinclasificar';
    var color = pal[tkey];
    var pct = Math.round((r.tasa_asistencia||0)*100);
    var partyNombre = r.partido_nombre || r.partido;
    var sexoLabel = SEXO_LABEL[r.sexo] || SEXO_LABEL_NEUTRO;
    var dotStyle = r.tendencia ? ('background:'+color+';border:1px solid '+color) : ('background:#F4EFE2;border:1px solid '+color);
    var tendLabel = r.tendencia ? TEND_LABELS[tkey] : 'Independiente';
    var barHtml = state.showBar ? ('<div class="asist-bar-track"><div class="asist-bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div>') : '';
    return ''
    +'<div class="data-row '+state.density+'" data-action="open-profile" data-id="'+esc(r.id)+'">'
      +'<div class="cell-nombre">'
        +'<span class="cell-nombre-name">'+esc(r.nombre)+'</span>'
        +(nar?'':'<span class="cell-nombre-sub">'+esc(sexoLabel)+'</span>')
      +'</div>'
      +'<div class="cell-partido"><span class="chip-sigla" title="'+esc(partyNombre)+'">'+esc(r.partido)+'</span></div>'
      +'<div class="cell-tend"><span class="tend-dot" style="'+dotStyle+'"></span><span class="tend-label">'+esc(tendLabel)+'</span></div>'
      +'<div class="cell-region"><span class="sin-dato">Sin dato</span></div>'
      +'<div class="cell-asist">'
        +(nar?'<span class="mobile-lbl">Asistencia</span>':'')
        +'<span class="num-val tabnum">'+pct+'%</span>'+barHtml
      +'</div>'
      +'<div class="cell-proy">'
        +(nar?'<span class="mobile-lbl">Proyectos presentados</span>':'')
        +'<span class="num-val tabnum">'+r.n_proyectos+'</span>'
      +'</div>'
      +'<div class="cell-vot">'
        +(nar?'<span class="mobile-lbl">Votaciones</span>':'')
        +'<span class="num-val tabnum">'+r.n_votaciones+'</span>'
      +'</div>'
    +'</div>';
  }).join('');
}

function buildEmptyState(){
  var isRegion = !!(state.region && state.region!=='__sindato__');
  var msg = isRegion
    ? ('Ningún diputado o diputada tiene la región <strong>'+esc(state.region)+'</strong> registrada. El dato de región/distrito aún no está disponible en la fuente para el período vigente.')
    : 'Ajusta los filtros o la búsqueda.';
  return '<div class="skel-empty"><div class="skel-empty-title">Sin resultados</div><div class="skel-empty-msg">'+msg+'</div></div>';
}

function buildErrorState(){
  return '<div class="skel-empty"><div class="skel-empty-title">No se pudo cargar el índice</div>'
    +'<div class="skel-empty-msg">Revisa la conexión y recarga la página. Se intentó leer <code>data/indice_diputados.json</code>.</div></div>';
}

function buildTable(rows, base){
  var nar = isNarrow();
  var body;
  if(state.indexError){
    body = buildErrorState();
  } else if(!state.indexReady){
    body = buildSkeletonRows();
  } else if(rows.length===0){
    body = buildEmptyState();
  } else {
    body = buildRows(rows);
  }
  return ''
  +'<div class="table-outer">'
    +'<div class="table-card'+(nar?' narrow':'')+'">'
      +buildTableHeader()
      +body
    +'</div>'
  +'</div>';
}

function buildIndexView(){
  var d = computeDerived();
  var hasFilters = !!(d.term || d.selP.length || d.selT.length || state.region);
  var html = '';
  html += buildFilters(d.base, hasFilters, d.rows.length);
  if(state.indexReady && !state.indexError) html += buildHemiciclo(d.base);
  html += buildTable(d.rows, d.base);
  return html;
}

/* ---- Perfil (ficha) ---- */
function buildProfileHeaderSkeleton(){
  return '<div class="mini-cards">'
    +'<div class="mini-card skel"><div class="skeleton" style="width:100%;height:100%"></div></div>'
    +'<div class="mini-card skel"><div class="skeleton" style="width:100%;height:100%"></div></div>'
    +'<div class="mini-card skel"><div class="skeleton" style="width:100%;height:100%"></div></div>'
  +'</div>';
}

// Materias como chips legibles; emptyMsg (opcional) cuando no hay materias.
function renderMaterias(materias, emptyMsg){
  if(!materias || materias.length===0){
    return emptyMsg ? '<span class="materia-empty">'+esc(emptyMsg)+'</span>' : '';
  }
  return '<div class="materias-line">'+materias.map(function(m){
    return '<span class="materia-chip" title="Materia '+esc(m.id)+'">'+esc(m.nombre)+'</span>';
  }).join('')+'</div>';
}

function buildVotacionesSection(p){
  var v = p.votaciones;
  var SENT_META = {a_favor:{label:'A favor',color:'#4B7A52'}, en_contra:{label:'En contra',color:'#A6483F'}, abstencion:{label:'Abstención',color:'#B0873C'}, dispensado:{label:'Dispensado',color:'#8C8578'}, no_vota:{label:'No vota',color:'#8C8578'}};
  var order = ['a_favor','en_contra','abstencion','dispensado','no_vota'];
  var total = v.n_votaciones || 0;
  var segs = order.map(function(k){
    var count = (v.resumen_por_sentido && v.resumen_por_sentido[k]) || 0;
    var pct = total>0 ? Math.round(count/total*100) : 0;
    return {key:k, label:SENT_META[k].label, color:SENT_META[k].color, count:count, pct:pct};
  }).filter(function(s){ return s.count>0; });

  var barHtml = segs.map(function(s){ return '<div style="width:'+s.pct+'%;height:100%;background:'+s.color+'"></div>'; }).join('');
  var legendHtml = segs.map(function(s){
    return '<span class="vot-legend-item"><span class="vot-legend-dot" style="background:'+s.color+'"></span>'+esc(s.label)+' <strong class="tabnum">'+s.count+'</strong></span>';
  }).join('');

  var list = (v.votos || []).slice();
  list.sort(function(a,b){ return (b.fecha||'').localeCompare(a.fecha||''); });
  var showNote = list.length>16;
  var listShown = list.slice(0,16);
  var rowsHtml = listShown.map(function(row){
    var resColor = row.resultado==='Aprobado' ? 'var(--accent-green)' : (row.resultado==='Rechazado' ? 'var(--accent-red)' : 'var(--text-muted)');
    var sentColor = {a_favor:'var(--accent-green)',en_contra:'var(--accent-red)',abstencion:'var(--accent-amber)',dispensado:'var(--accent-gray)',no_vota:'var(--accent-gray)'}[row.sentido] || 'var(--text-muted)';
    var sentLabel = SENT_META[row.sentido] ? SENT_META[row.sentido].label : row.sentido;
    // Columna "Boletin": si hay boletin lo muestra; si no, el TIPO del voto
    // (Proyecto de Resolucion/Acuerdo/Otros) en italica -> deja claro que es un
    // instrumento sin boletin, no un dato faltante.
    var colBoletin = row.boletin
      ? '<span class="mini-cell-boletin">'+esc(row.boletin)+'</span>'
      : '<span class="mini-cell-boletin voto-tipo-sinbol">'+esc(row.tipo||'Sin boletín')+'</span>';
    // Columna "Materia": si el voto tiene proyecto resuelto, muestra el TITULO
    // real del proyecto votado y sus materias (que trata de...); si no, cae a la
    // descripcion cruda de la votacion.
    var colDesc;
    if(row.proyecto){
      colDesc = '<span class="mini-cell-desc"><span class="voto-proyecto-nombre">'+esc(row.proyecto.nombre)+'</span>'
        +renderMaterias(row.proyecto.materias)+'</span>';
    } else {
      colDesc = '<span class="mini-cell-desc">'+esc(row.descripcion||'—')+'</span>';
    }
    return '<div class="mini-row">'
      +colBoletin
      +'<span class="mini-cell-fecha">'+esc(fmtFecha(row.fecha))+'</span>'
      +colDesc
      +'<span class="mini-cell-res" style="color:'+resColor+'">'+esc(row.resultado||'—')+'</span>'
      +'<span class="mini-cell-sent" style="color:'+sentColor+'">'+esc(sentLabel)+'</span>'
    +'</div>';
  }).join('');

  return ''
  +'<div class="section-card">'
    +'<div class="section-head">'
      +'<span class="section-label">Votaciones</span>'
      +'<span class="section-total"><strong>'+total+'</strong> registradas</span>'
    +'</div>'
    +'<div class="stack-bar">'+barHtml+'</div>'
    +'<div class="vot-legend">'+legendHtml+'</div>'
    +'<div class="mini-thead"><span style="width:82px;flex:0 0 82px">Boletín</span><span style="width:88px;flex:0 0 88px">Fecha</span><span style="flex:1 1 auto;min-width:160px">Materia</span><span style="width:92px;flex:0 0 92px">Resultado</span><span style="width:88px;flex:0 0 88px">Mi voto</span></div>'
    +'<div class="mini-tbody">'+(rowsHtml||'<div class="mini-row" style="color:var(--text-muted-2);font-style:italic">Sin votaciones registradas.</div>')+'</div>'
    +(showNote?('<div class="note-italic">Se muestra una muestra de 16 votaciones de '+total+' registradas.</div>'):'')
  +'</div>';
}

function buildProyectosSection(p){
  var py = p.proyectos;
  var total = py.n_proyectos || 0;
  var list = py.proyectos || [];
  var badge = '<span class="badge-nodisp">El estado de tramitación no está disponible en la fuente</span>';
  if(total===0){
    return '<div class="section-card">'
      +'<div class="section-head"><span class="section-label">Proyectos presentados · mociones <strong style="color:var(--text-primary-2);font-family:var(--font-serif);font-size:18px;margin-left:6px">0</strong></span>'+badge+'</div>'
      +'<div class="empty-italic">No presentó mociones en el período.</div>'
    +'</div>';
  }
  var sorted = list.slice().sort(function(a,b){ return (b.fecha_ingreso||'').localeCompare(a.fecha_ingreso||''); });
  var rowsHtml = sorted.map(function(row){
    var isAdm = row.admisible === 'true' || row.admisible === true;
    var admLabel = isAdm ? 'Admisible' : 'Inadmisible';
    var admCls = isAdm ? 'si' : 'no';
    /* Rol: la API entrega Orden=0 para todos los firmantes, no distingue
       autor/adherente (ver CLAUDE.md, huecos). No se fabrica esa jerarquia:
       se muestra el rol real "firmante" (capitalizado). */
    var rolLabel = row.rol ? (row.rol.charAt(0).toUpperCase()+row.rol.slice(1)) : '—';
    // Contenido legible: tipo de iniciativa (etiqueta) y materias (chips), o
    // "Sin materias registradas" explicito (decision de diseno; no se oculta).
    var tipoTag = row.tipo_iniciativa ? '<span class="tipo-tag">'+esc(row.tipo_iniciativa)+'</span>' : '';
    var materiasHtml = renderMaterias(row.materias, 'Sin materias registradas');
    return '<div class="proy-row">'
      +'<span class="proy-cell-boletin">'+esc(row.boletin||'Sin boletín')+'</span>'
      +'<span class="proy-cell-nombre">'+esc(row.nombre||'—')
        +'<div>'+tipoTag+'</div>'+materiasHtml
      +'</span>'
      +'<span class="proy-cell-fecha">'+esc(fmtFecha(row.fecha_ingreso))+'</span>'
      +'<span class="proy-cell-rol">'+esc(rolLabel)+'</span>'
      +'<span class="proy-cell-adm"><span class="pill-adm '+admCls+'">'+admLabel+'</span></span>'
    +'</div>';
  }).join('');
  return ''
  +'<div class="section-card">'
    +'<div class="section-head"><span class="section-label">Proyectos presentados · mociones <strong style="color:var(--text-primary-2);font-family:var(--font-serif);font-size:18px;margin-left:6px">'+total+'</strong></span>'+badge+'</div>'
    +'<div style="margin-top:12px">'
      +'<div class="mini-thead proy-thead"><span class="b">Boletín</span><span class="n">Nombre del proyecto</span><span class="f">Ingreso</span><span class="r">Rol</span><span class="a">Admisible</span></div>'
      +rowsHtml
    +'</div>'
  +'</div>';
}

function buildProfileView(){
  var id = state.selectedId;
  var rec = (state.index || []).filter(function(r){ return r.id===id; })[0];
  if(!rec){
    return '<div class="profile-view fade-up">'
      +'<button class="btn-back" data-action="back"><span class="chevron">‹</span> Volver al índice</button>'
      +'<div class="skel-empty"><div class="skel-empty-title">No se encontró a esta persona</div><div class="skel-empty-msg">El id <code>'+esc(id)+'</code> no está en el índice actual.</div></div>'
    +'</div>';
  }
  var pal = currentPalette();
  var tkey = rec.tendencia || 'sinclasificar';
  var color = pal[tkey];
  var pct = Math.round((rec.tasa_asistencia||0)*100);
  var partyNombre = rec.partido_nombre || rec.partido;
  var tendChipStyle = rec.tendencia
    ? ('background:'+color+';color:#FBFAF5')
    : ('background:transparent;color:var(--text-muted);border:1px solid '+pal.sinclasificar);
  var tendDotStyle = rec.tendencia ? 'background:rgba(255,255,255,.85)' : ('background:#F4EFE2;border:1px solid '+pal.sinclasificar);
  var tendLabel = rec.tendencia ? TEND_LABELS[tkey] : 'Independiente';

  var loading = state.profileLoading;
  var loaded = !loading && !state.profileError && !!state.profileCache[id];
  var errored = !loading && state.profileError;
  var p = loaded ? state.profileCache[id] : null;

  var miniCards;
  if(loaded){
    var a = p.asistencia;
    miniCards = '<div class="mini-cards">'
      +'<div class="mini-card"><div class="val tabnum" style="color:var(--text-primary)">'+a.n_sesiones+'</div><div class="lbl">Sesiones</div></div>'
      +'<div class="mini-card"><div class="val tabnum" style="color:var(--accent-green)">'+a.n_asiste+'</div><div class="lbl">Asiste</div></div>'
      +'<div class="mini-card"><div class="val tabnum" style="color:var(--accent-red)">'+a.n_no_asiste+'</div><div class="lbl">No asiste</div></div>'
    +'</div>';
  } else if(errored){
    miniCards = '<div style="font-size:12px;color:var(--accent-red)">No se pudo cargar el detalle de asistencia.</div>';
  } else {
    miniCards = buildProfileHeaderSkeleton();
  }

  var lowerSection;
  if(loading){
    lowerSection = '<div style="display:flex;flex-direction:column;gap:18px;margin-top:18px">'
      +'<div class="skel-block" style="height:240px"></div>'
      +'<div class="skel-block" style="height:150px"></div>'
    +'</div>';
  } else if(errored){
    lowerSection = '<div class="skel-empty" style="margin-top:18px;background:var(--surface-card);border:1px solid var(--border-card);border-radius:14px">'
      +'<div class="skel-empty-title">No se pudo cargar la ficha</div>'
      +'<div class="skel-empty-msg">Revisa la conexión y vuelve a intentar. Se intentó leer <code>data/perfiles/'+esc(id)+'.json</code>.</div>'
    +'</div>';
  } else if(loaded){
    lowerSection = '<div class="fade-up" style="margin-top:0">'+buildVotacionesSection(p)+buildProyectosSection(p)+'</div>';
  } else {
    lowerSection = '';
  }

  return ''
  +'<div class="profile-view fade-up">'
    +'<button class="btn-back" data-action="back"><span class="chevron">‹</span> Volver al índice</button>'
    +'<div class="profile-header">'
      +'<div class="profile-left">'
        +'<div>'
          +'<div class="profile-eyebrow">Ficha de diputada o diputado</div>'
          +'<h1 class="profile-h1">'+esc(rec.nombre)+'</h1>'
        +'</div>'
        +'<div class="profile-chips">'
          +'<span class="chip-tend" style="'+tendChipStyle+'"><span class="chip-tend-dot" style="'+tendDotStyle+'"></span>'+esc(tendLabel)+'</span>'
          +'<span class="chip-party"><span class="sigla">'+esc(rec.partido)+'</span><span class="nombre">'+esc(partyNombre)+'</span></span>'
          +'<span class="chip-region"><span>Región/distrito: Sin dato</span></span>'
        +'</div>'
      +'</div>'
      +'<div class="profile-right">'
        +'<div class="asist-head">'
          +'<span class="asist-label">Asistencia</span>'
          +'<span class="asist-pct-wrap"><span class="asist-pct">'+pct+'</span><span class="asist-pct-sign">%</span></span>'
        +'</div>'
        +'<div class="asist-track"><div class="asist-fill" style="width:'+pct+'%"></div></div>'
        +miniCards
      +'</div>'
    +'</div>'
    +lowerSection
  +'</div>';
}

/* =========================================================================
   RENDER + EVENTOS (delegacion; el input de busqueda conserva foco/cursor)
   ========================================================================= */
var app = document.getElementById('app');

function render(){
  var active = document.activeElement;
  var activeId = active && active.id;
  var selStart = active && typeof active.selectionStart==='number' ? active.selectionStart : null;
  var selEnd = active && typeof active.selectionEnd==='number' ? active.selectionEnd : null;

  var html = buildTopbar();
  if(state.view==='profile'){
    html += buildProfileView();
  } else {
    html += buildIndexView();
  }
  var anyPanelOpen = state.partyPanelOpen || state.regionPanelOpen || state.settingsPanelOpen;
  if(anyPanelOpen) html += '<div class="overlay" data-action="close-overlay"></div>';

  app.innerHTML = html;

  if(activeId){
    var el = document.getElementById(activeId);
    if(el && typeof el.focus==='function'){
      el.focus();
      if(selStart!==null && el.setSelectionRange){ try{ el.setSelectionRange(selStart, selEnd); }catch(e){} }
    }
  }
}

app.addEventListener('click', function(e){
  var el = e.target.closest('[data-action]');
  if(!el) return;
  var action = el.dataset.action;
  switch(action){
    case 'toggle-party-panel':
      state.partyPanelOpen = !state.partyPanelOpen; state.regionPanelOpen=false; state.settingsPanelOpen=false; break;
    case 'toggle-region-panel':
      state.regionPanelOpen = !state.regionPanelOpen; state.partyPanelOpen=false; state.settingsPanelOpen=false; break;
    case 'toggle-settings-panel':
      state.settingsPanelOpen = !state.settingsPanelOpen; state.partyPanelOpen=false; state.regionPanelOpen=false; break;
    case 'close-overlay':
      state.partyPanelOpen=false; state.regionPanelOpen=false; state.settingsPanelOpen=false; break;
    case 'toggle-party': {
      var sig = el.dataset.sigla;
      if(state.selectedParties[sig]) delete state.selectedParties[sig]; else state.selectedParties[sig]=true;
      break;
    }
    case 'select-region':
      state.region = el.dataset.value; state.regionPanelOpen=false; break;
    case 'reset-filters':
      state.search=''; state.selectedParties={}; state.selectedTend={}; state.region=''; break;
    case 'toggle-tend': {
      var t = el.dataset.tend;
      if(state.selectedTend[t]) delete state.selectedTend[t]; else state.selectedTend[t]=true;
      break;
    }
    case 'sort': {
      var f = el.dataset.field;
      if(state.sort.field===f){ state.sort = {field:f, dir: state.sort.dir==='asc'?'desc':'asc'}; }
      else { state.sort = {field:f, dir: f==='nombre'?'asc':'desc'}; }
      break;
    }
    case 'open-profile': openProfile(el.dataset.id); return;
    case 'back': goBack(); return;
    case 'set-scheme': state.scheme = el.dataset.scheme; break;
    case 'set-density': state.density = el.dataset.density; break;
    case 'toggle-bar': state.showBar = !state.showBar; break;
    default: return;
  }
  render();
});

app.addEventListener('input', function(e){
  if(e.target && e.target.id==='search-input'){
    state.search = e.target.value;
    render();
  }
});

/* =========================================================================
   ARRANQUE
   ========================================================================= */
render(); /* primer paint: skeleton */
syncFromHash(); /* soporta deep-link inicial (#/diputado/<id>) */
loadIndex();
</script>
